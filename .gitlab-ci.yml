variables:
  USER_EMAIL_DEV: "053xp@tohru.org"
  USER_PASSWORD_DEV: "Test@1234"
  ADMIN_USER_EMAIL: "system_admin@prettybank.com"
  ADMIN_USER_PASSWORD: "SystemSuperAdmin1!"
  BASE_URL_DEV: "https://web-dev.pretty.andersenlab.dev/"
  API_URL_DEV: "https://api-dev.pretty.andersenlab.dev/api"

stages:
  - testing
  - reports
  - deploy

before_script:
    - pip install poetry
    - poetry config virtualenvs.in-project true
    - poetry install --no-root
    - poetry run playwright install
    - poetry run playwright install-deps

ui_tests:
  stage: testing
  image: python:3.12.3-slim
  script:
    - poetry run pytest --alluredir=allure-results ./tests/ui -n=4
  allow_failure: true
  artifacts:
    paths:
      - allure-results
    expire_in: 1 day
  rules:
    - when: always

api_tests:
  stage: testing
  image: python:3.12.3-slim
  script:
    - poetry run pytest --alluredir=allure-results ./tests/api -n=4
  allow_failure: true
  artifacts:
    paths:
      - allure-results
    expire_in: 1 day
  rules:
    - when: always

history_copy:
  stage: reports
  image: ubuntu:latest
  dependencies: []
  before_script: []
  script:
      - apt update && apt install -y curl unzip
      - curl --fail --location \
        --output artifacts.zip \
        "https://git.andersenlab.com/api/v4/projects/$CI_PROJECT_ID/jobs/artifacts/main/download?job=pages&job_token=$CI_JOB_TOKEN" \
        || echo "No previous Pages artifacts"
      - unzip artifacts.zip || echo "Nothing to unzip"
      - mkdir -p allure-results/history
      - cp -r ./public/history/* allure-results/history/ || true
  allow_failure: true
  artifacts:
    paths:
      - allure-results
    expire_in: 1 day
  rules:
    - when: always

allure_report:
  stage: reports
  image: frankescobar/allure-docker-service
  dependencies:
    - history_copy
    - ui_tests
    - api_tests
  before_script: []
  script:
    - ls -la
    - allure generate -c ./allure-results -o ./allure-report
    - ls -la ./allure-report
  artifacts:
    paths:
      - ./allure-results
      - ./allure-report

pages:
  stage: deploy
  dependencies:
    - allure_report
  before_script: []
  script:
    - mkdir -p public
    - mv ./allure-report/* public
  artifacts:
    paths:
      - public
  rules:
    - when: always