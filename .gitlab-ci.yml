variables:
  USER_EMAIL_DEV: "053xp@tohru.org"
  USER_PASSWORD_DEV: "Test@1234"
  ADMIN_USER_EMAIL: "system_admin@prettybank.com"
  ADMIN_USER_PASSWORD: "SystemSuperAdmin1!"
  BASE_URL_DEV: "https://web-dev.pretty.andersenlab.dev/"
  API_URL_DEV: "https://api-dev.pretty.andersenlab.dev/api"

stages:
  - testing
  - reports
  - deploy

before_script:
  - pip install poetry
  - poetry config virtualenvs.in-project true
  - poetry install --no-root
  - poetry run playwright install
  - poetry run playwright install-deps

############################
# UI TESTS
############################
ui_tests:
  stage: testing
  image: python:3.12.3-slim
  script:
    - poetry run pytest --alluredir=allure-results-ui ./tests/ui -n=4
  allow_failure: true
  artifacts:
    paths:
      - allure-results-ui
    expire_in: 1 day
  rules:
    - when: always

############################
# API TESTS
############################
api_tests:
  stage: testing
  image: python:3.12.3-slim
  script:
    - poetry run pytest --alluredir=allure-results-api ./tests/api -n=4
  allow_failure: true
  artifacts:
    paths:
      - allure-results-api
    expire_in: 1 day
  rules:
    - when: always

############################
# HISTORY COPY
############################
history_copy:
  stage: reports
  image: ubuntu:latest
  dependencies: []
  before_script: []
  script:
    - apt update && apt install -y curl unzip
    - curl --fail --location \
      --output artifacts.zip \
      "https://git.andersenlab.com/api/v4/projects/$CI_PROJECT_ID/jobs/artifacts/main/download?job=pages&job_token=$CI_JOB_TOKEN" \
      || echo "No previous Pages artifacts"
    - unzip artifacts.zip || echo "Nothing to unzip"
    - mkdir -p allure-history
    - cp -r ./public/history/* allure-history/ || true
  allow_failure: true
  artifacts:
    paths:
      - allure-history
    expire_in: 1 day
  rules:
    - when: always

############################
# ALLURE REPORT MERGE + GENERATION
############################
allure_report:
  stage: reports
  image: frankescobar/allure-docker-service
  dependencies:
    - ui_tests
    - api_tests
    - history_copy
  before_script: []
  script:
    - echo "=== Checking merged sources ==="
    - ls -R .
    - echo "=== Creating merged-results ==="
    - mkdir merged-results
    - cp -r allure-results-ui/* merged-results/ || echo "NO UI RESULTS"
    - cp -r allure-results-api/* merged-results/ || echo "NO API RESULTS"
    - cp -r allure-history/* merged-results/history/ || echo "NO HISTORY"
    - echo "=== Contents of merged-results ==="
    - ls -R merged-results
    - allure generate -c merged-results -o allure-report || echo "ALLURE FAILED"
    - echo "=== Contents of allure-report ==="
    - ls -R allure-report || echo "NO REPORT GENERATED"
  artifacts:
    paths:
      - allure-report
    expire_in: 1 week

############################
# DEPLOY TO PAGES
############################
pages:
  stage: deploy
  dependencies:
    - allure_report
  before_script: []
  script:
    - mkdir -p public
    - mv allure-report/* public/
  artifacts:
    paths:
      - public
  rules:
    - when: always
